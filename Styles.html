<style>
:root{--green:#166534;--light:#f8fafc;--line:#e2e8f0;--text:#1e293b;--muted:#64748b}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--light);color:var(--text)}.sidebar{position:fixed;inset:0 auto 0 0;width:240px;background:#0f172a;color:white;padding:20px;display:flex;flex-direction:column;gap:8px}.sidebar h1{font-size:20px;margin:0 0 18px}.nav,.sidebar button{border:0;border-radius:8px;padding:10px 12px;text-align:left;background:transparent;color:white;cursor:pointer}.nav.active,.nav:hover{background:var(--green)}button{background:var(--green);color:white;border:0;border-radius:8px;padding:10px 14px;cursor:pointer;font-weight:600}.secondary{background:#475569}.full{width:100%;margin-top:auto;text-align:center}.content{margin-left:240px;padding:24px}.page{display:none}.page.active{display:block}.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.filters,.cards,.actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}.filters label,.filters input,.filters select{min-width:150px}.card,.report-paper{background:white;border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:0 1px 3px #0001}.cards .card{flex:1;min-width:170px}.metric{font-size:24px;font-weight:700;color:var(--green)}.muted{color:var(--muted);font-size:12px}.charts{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:16px}.charts canvas{background:white;border:1px solid var(--line);border-radius:12px;padding:12px;min-height:260px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(240px,1fr));gap:14px}label{display:flex;flex-direction:column;gap:6px;font-weight:600}input,select,textarea{border:1px solid var(--line);border-radius:8px;padding:9px;background:white}textarea{min-height:70px}.span-2{grid-column:1/-1}.details,.preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:#f1f5f9;border-radius:8px;padding:12px}.table-wrap{overflow:auto;background:white;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top}th{background:#f1f5f9}.toast{position:fixed;top:16px;right:16px;z-index:4;background:#166534;color:white;padding:12px 16px;border-radius:8px}.toast.error{background:#b91c1c}.hidden{display:none!important}.modal{position:fixed;inset:0;background:#0008;display:flex;align-items:center;justify-content:center;z-index:3}.modal-card{background:white;width:min(920px,94vw);max-height:90vh;overflow:auto;border-radius:12px;padding:20px;position:relative}.close{position:absolute;right:12px;top:12px;background:#94a3b8}.report-paper h3{border-bottom:1px solid var(--line);padding-bottom:6px}.report-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}@media(max-width:800px){.sidebar{position:static;width:auto}.content{margin-left:0}.charts,.form-grid,.report-grid{grid-template-columns:1fr}.details,.preview{grid-template-columns:1fr}}@media print{.sidebar,.page-header,.filters,.actions,.toast,.modal{display:none!important}.content{margin:0;padding:0}.page{display:none!important}#report{display:block!important}.report-paper{box-shadow:none;border:0}.table-wrap{overflow:visible}}
</style>
