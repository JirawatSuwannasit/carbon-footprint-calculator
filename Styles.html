<style>
:root{--green:#166534;--green-dark:#14532d;--blue:#2563eb;--blue-dark:#1d4ed8;--red:#dc2626;--red-dark:#b91c1c;--amber:#d97706;--gray:#475569;--gray-dark:#334155;--light:#f8fafc;--line:#e2e8f0;--text:#1e293b;--muted:#64748b}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--light);color:var(--text)}.sidebar{position:fixed;inset:0 auto 0 0;width:240px;background:#0f172a;color:white;padding:20px;display:flex;flex-direction:column;gap:8px}.sidebar h1{font-size:20px;margin:0 0 18px}.nav,.sidebar button{border:0;border-radius:8px;padding:10px 12px;text-align:left;background:transparent;color:white;cursor:pointer}.nav.active,.nav:hover{background:var(--green)}button{border:0;border-radius:8px;padding:10px 14px;cursor:pointer;font-weight:700;transition:background .15s ease,transform .08s ease,box-shadow .15s ease,opacity .15s ease}button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid #93c5fd;outline-offset:2px}button:hover:not(:disabled){box-shadow:0 2px 8px #0002;filter:brightness(1.03)}button:active:not(:disabled){transform:translateY(1px);box-shadow:inset 0 2px 4px #0003}button:disabled,button.loading{cursor:not-allowed;opacity:.65;box-shadow:none}.btn-primary,button:not(.nav):not(.btn-secondary):not(.btn-edit):not(.btn-delete):not(.btn-cancel):not(.btn-save){background:var(--green);color:white}.btn-primary:hover:not(:disabled),button:not(.nav):not(.btn-secondary):not(.btn-edit):not(.btn-delete):not(.btn-cancel):not(.btn-save):hover:not(:disabled){background:var(--green-dark)}.btn-secondary,.secondary{background:var(--gray);color:white}.btn-secondary:hover:not(:disabled),.secondary:hover:not(:disabled){background:var(--gray-dark)}.btn-edit{background:var(--blue);color:white}.btn-edit:hover:not(:disabled){background:var(--blue-dark)}.btn-delete{background:var(--red);color:white}.btn-delete:hover:not(:disabled){background:var(--red-dark)}.btn-cancel{background:#94a3b8;color:#0f172a}.btn-cancel:hover:not(:disabled){background:#64748b;color:white}.btn-save{background:var(--green);color:white}.btn-save:hover:not(:disabled){background:var(--green-dark)}.loading::before{content:"";display:inline-block;width:.9em;height:.9em;margin-right:.45em;border:2px solid #fff8;border-top-color:#fff;border-radius:50%;vertical-align:-.15em;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.full{width:100%;margin-top:auto;text-align:center}.content{margin-left:240px;padding:24px}.page{display:none}.page.active{display:block}.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.filters,.cards,.actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}.filters label,.filters input,.filters select{min-width:150px}.section-card{margin-top:18px}.checkbox-list{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:8px;margin:12px 0}.checkbox-row{display:block;font-weight:500;padding:8px;border:1px solid var(--line);border-radius:8px;background:#f8fafc}.checkbox-row input{margin-right:8px}.card,.report-paper{background:white;border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:0 1px 3px #0001}.cards .card{flex:1;min-width:170px}.metric{font-size:24px;font-weight:700;color:var(--green)}.muted{color:var(--muted);font-size:12px}.charts{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:16px}.charts canvas{background:white;border:1px solid var(--line);border-radius:12px;padding:12px;min-height:260px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(240px,1fr));gap:14px}label{display:flex;flex-direction:column;gap:6px;font-weight:600}input,select,textarea{border:1px solid var(--line);border-radius:8px;padding:9px;background:white}textarea{min-height:70px}.span-2{grid-column:1/-1}.details,.preview{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:#f1f5f9;border-radius:8px;padding:12px}.table-wrap{overflow:auto;background:white;border
